---
# Simple Apache Verification Playbook

- name: Check Apache
  hosts: webservers
  become: yes
  tasks:
    - name: Ensure Apache is installed
      ansible.builtin.apt:
        name: apache2
        state: present

    - name: Ensure Apache is running
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: yes

    - name: Create test page
      ansible.builtin.copy:
        content: "<h1>Apache is running!</h1>"
        dest: /var/www/html/index.html
